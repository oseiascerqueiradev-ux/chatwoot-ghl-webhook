services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chatwoot-ghl-webhook
    restart: unless-stopped
    environment:
      NODE_ENV: production
    env_file:
      - .env
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then((res) => { if (!res.ok) process.exit(1); }).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
